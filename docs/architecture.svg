<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer 1: User Preferences -->
  <rect x="40" y="30" width="600" height="70" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="55" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Layer 1 — User preferences</text>
  <text x="340" y="77" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Always loaded · identity, routing, core rules</text>

  <!-- Arrow: Layer 1 → Layer 2 -->
  <line x1="340" y1="100" x2="340" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="120" text-anchor="start" font-size="12" fill="#5F5E5A">On-demand fetch via bridge</text>

  <!-- Layer 2: Knowledge Hub container -->
  <rect x="40" y="130" width="600" height="210" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Layer 2 — Knowledge hub</text>

  <!-- Sub-sections inside Layer 2 -->
  <rect x="70" y="175" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="125" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Rules</text>
  <text x="125" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Decision logic</text>

  <rect x="200" y="175" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="255" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Projects</text>
  <text x="255" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Active work</text>

  <rect x="330" y="175" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="385" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">References</text>
  <text x="385" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Facts, contacts</text>

  <rect x="460" y="175" width="80" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="500" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">SOP</text>
  <text x="500" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Procedures</text>

  <rect x="558" y="175" width="68" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="592" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Prompts</text>
  <text x="592" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Templates</text>

  <!-- Bidirectional labels -->
  <text x="170" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">Human reads + writes</text>
  <text x="500" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">AI reads + writes</text>

  <!-- Arrows: Human ↔ Hub -->
  <line x1="160" y1="272" x2="160" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="298" x2="180" y2="272" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows: AI ↔ Hub -->
  <line x1="490" y1="272" x2="490" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="298" x2="510" y2="272" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Human box -->
  <rect x="110" y="300" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="170" y="322" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Human</text>

  <!-- Bridge box -->
  <rect x="280" y="300" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="314" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Bridge</text>
  <text x="340" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">MCP / API</text>

  <!-- LLM box -->
  <rect x="450" y="300" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="510" y="322" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">LLM</text>

  <!-- Arrows: Human → Bridge ↔ LLM -->
  <line x1="230" y1="322" x2="278" y2="322" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="314" x2="448" y2="314" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="448" y1="330" x2="400" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Version-Controlled Backup -->
  <rect x="40" y="390" width="600" height="70" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text x="340" y="415" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Layer 3 — Version-controlled backup (optional)</text>
  <text x="340" y="437" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Plain text mirror · vendor-neutral · git history</text>

  <!-- Dashed arrow: Layer 2 → Layer 3 -->
  <line x1="340" y1="355" x2="340" y2="388" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="350" y="376" text-anchor="start" font-size="12" fill="#5F5E5A">Periodic sync</text>

  <!-- Legend -->
  <text x="40" y="488" font-size="12" fill="#888780">Solid = active workflow · Dashed = safety net · Arrows = read/write direction</text>

</svg>
